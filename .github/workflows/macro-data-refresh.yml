name: Macro data refresh

on:
  # 12:30 ET = 17:30 UTC (during DST). BLS releases at 08:30 ET, so this
  # gives FRED time to ingest before we pull.
  schedule:
    - cron: "30 17 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: macro-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-macro.txt

      - name: Fetch macro data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python backend/scripts/fetch_macro_data.py frontend/public/data/macro.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/macro.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(macro): daily data refresh $(date -u +%Y-%m-%d)"
            git push
          fi
